camera:
  backend: auto
  device_index: 0
  width: 960
  height: 720
  fps: 8
  warmup_seconds: 2

paths:
  recordings_dir: recordings
  unsent_dir: recordings/unsent

recording:
  pre_seconds: 4
  post_seconds: 15
  max_event_seconds: 60
  min_event_seconds: 3
  raw_fourcc: MJPG
  raw_quality: 95
  writer_queue_frames: 64

detection:
  process_width: 320
  background_history: 500
  background_var_threshold: 45
  learning_rate: -1
  min_area: 4
  max_area: 260
  max_global_motion_ratio: 0.008
  max_candidates_per_frame: 3
  max_candidate_area_ratio: 0.0035
  max_bbox_area: 420
  max_aspect_ratio: 4.5
  min_fill_ratio: 0.12
  max_fill_ratio: 0.95
  min_contrast: 10
  min_dark_contrast: 12
  max_foreground_brightness: 140
  min_surround_brightness: 80
  max_surround_stddev: 55
  min_track_hits: 3
  track_ttl_frames: 8
  min_track_distance: 6
  min_track_speed: 1.2
  merge_distance: 34
  debug_preview: false
  log_rejections_every_frames: 120

compression:
  enabled: true
  ffmpeg_path: ffmpeg
  crf: 24
  preset: veryfast
  scale_width: 960
  sharpen: true
  delete_raw_after_compress: true

upload:
  enabled: true
  server_url: "https://example.trycloudflare.com"
  api_key: "change-me"
  timeout_seconds: 45
  retry_count: 4
  retry_backoff_seconds: 8
