camera:
  backend: auto
  device_index: 0
  width: 640
  height: 480
  fps: 10
  warmup_seconds: 2

paths:
  recordings_dir: recordings
  unsent_dir: recordings/unsent

recording:
  pre_seconds: 4
  post_seconds: 15
  max_event_seconds: 60
  min_event_seconds: 3
  raw_fourcc: MJPG
  raw_quality: 95

detection:
  process_width: 320
  background_history: 420
  background_var_threshold: 38
  learning_rate: -1
  min_area: 4
  max_area: 420
  max_global_motion_ratio: 0.010
  max_candidates_per_frame: 3
  max_candidate_area_ratio: 0.004
  max_bbox_area: 900
  max_aspect_ratio: 5.0
  min_fill_ratio: 0.12
  max_fill_ratio: 0.95
  min_contrast: 10
  min_dark_contrast: 12
  min_track_hits: 3
  track_ttl_frames: 8
  min_track_distance: 7
  min_track_speed: 1.5
  merge_distance: 32
  debug_preview: false

compression:
  enabled: true
  ffmpeg_path: ffmpeg
  crf: 12
  preset: veryfast
  scale_width: 640
  sharpen: true
  delete_raw_after_compress: false

upload:
  enabled: true
  server_url: "https://example.trycloudflare.com"
  api_key: "change-me"
  timeout_seconds: 45
  retry_count: 4
  retry_backoff_seconds: 8
